spring:
  application:
    name: macro-balance-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/macro_balance
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      fail-on-empty-beans: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Custom app properties ──────────────────────────────────────
app:
  jwt:
    secret: "macrobalance-super-secret-key-must-be-at-least-32-chars-long"
    expiration-ms: 86400000

cors:
  allowed-origins:
    - http://localhost:4200
    - http://localhost:1234
    - https://macrobalance.in

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always